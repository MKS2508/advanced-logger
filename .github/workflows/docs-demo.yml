---
name: Docs & Demo Deployment

on:
  workflow_dispatch:
  # Solo se ejecuta manualmente o cuando se llama desde otro workflow
  workflow_call:

env:
  NODE_VERSION: '20'

jobs:
  # ===== BUILD DEMO =====
  build-demo:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "📦 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: "🔧 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🏗️ Build demo (vite)"
        run: bun run demo:build

      - name: "🏗️ Setup demo structure"
        run: |
          mkdir -p _site
          # Copy built demo (vite outputs to dist-demo/) as site root
          cp -r dist-demo/. _site/

          # Create demo metadata
          echo "## 📦 Demo Build Info" > _site/build-info.md
          echo "- **Build Date**: $(date)" >> _site/build-info.md
          echo "- **Commit**: ${{ github.sha }}" >> _site/build-info.md
          echo "- **Version**: $(node -p 'require("./package.json").version')" >> _site/build-info.md

      - name: "📤 Upload demo artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: demo-site
          path: _site/
          retention-days: 30

  # ===== BUILD DOCS =====
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "📦 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "🔧 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "📚 Generate API reference (TypeDoc)"
        run: bun run docs:api

      - name: "📤 Build Jekyll documentation"
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site/docs

      - name: "🔓 Ensure _site/docs is writable"
        # Jekyll's actions/jekyll-build-pages runs in a Docker container as root,
        # so the output tree is owned by root and unwritable for the runner.
        # Open it up: chmod -R a+rwX makes everything user-writable recursively.
        run: chmod -R a+rwX _site/docs && chmod a+rwX _site/docs
        continue-on-error: false

      - name: "📄 Serve raw .md pages + generate llms.txt"
        run: bun scripts/build-md-serve.ts

      - name: "📤 Upload docs artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: _site/docs/
          retention-days: 30

  # ===== DEPLOY TO GITHUB PAGES =====
  deploy-pages:
    runs-on: ubuntu-latest
    needs: [build-demo, build-docs]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "📥 Download demo artifacts"
        uses: actions/download-artifact@v4
        with:
          name: demo-site
          path: _site/

      - name: "📥 Download docs artifacts"
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: _site/docs/

      - name: "📤 Setup Pages"
        uses: actions/configure-pages@v4

      - name: "📤 Upload to Pages"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Deployment summary
        run: |
          echo "## 📝 Documentation & Demo Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "- **Demo URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docs URL**: ${{ steps.deployment.outputs.page_url }}docs/" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Info**: ${{ steps.deployment.outputs.page_url }}build-info.md" >> $GITHUB_STEP_SUMMARY
