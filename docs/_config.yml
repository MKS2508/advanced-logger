title: "better-logger documentation"
description: "TypeScript logger with CSS styling, MDC context propagation, transports (File/HTTP/OTLP→SigNoz), hooks, serializers, and integrated CLI primitives."
url: "https://mks2508.github.io"
baseurl: "/advanced-logger/docs"

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  input: GFM

# Custom theme — layouts live in _layouts/, no `theme:` key.
plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

navigation:
  - title: Overview
    url: /
  - title: Transports
    url: /transports/
  - title: Context (MDC)
    url: /context/
  - title: Hooks
    url: /hooks/
  - title: Serializers
    url: /serializers/
  - title: Styling
    url: /styles/
  - title: CLI primitives
    url: /cli/
  - title: Playground
    url: /playground/
  - title: Core API
    url: /core/
  - title: Node migration
    url: /migration/
  - title: API reference
    url: /api/